name: Monitor TheShy Ranked Status

on:
  schedule:
    # 注意: GitHub Actions cron 用 UTC, 最小粒度 5 分钟但常会延迟
    # 每 5 分钟跑一次 (实际触发可能 5-15 分钟一次)
    # 因为 TheShy 开了主播模式, 游戏进行中 OP.GG 拿不到数据, 只能等比赛结束后尽快感知
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force_notify:
        description: '强制推送测试通知 (不管状态变化)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'theshy_opgg_monitor.py'
      - 'requirements_opgg.txt'
      - '.github/workflows/theshy-monitor.yml'

concurrency:
  group: theshy-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_opgg.txt

      - name: Install dependencies
        run: pip install -r requirements_opgg.txt

      - name: Run monitor
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          THESHY_RIOT_ID: ${{ secrets.THESHY_RIOT_ID }}
          THESHY_REGION: ${{ secrets.THESHY_REGION }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        run: |
          # 强制测试通知模式
          if [ "$FORCE_NOTIFY" = "true" ]; then
            python3 theshy_opgg_monitor.py --test-notify
            exit 0
          fi
          # 正常单次检测 (脚本内部会用默认值 TheShy#KR1 / KR)
          python3 theshy_opgg_monitor.py --once --verbose

      - name: Commit state + events files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          changed=0
          # 旧版兼容文件 + 多账号数据文件
          for f in .theshy_opgg_state.json .theshy_events.json .theshy_profile.json .theshy_matches.json .theshy_data.json .theshy_state_*.json .theshy_matches_*.json; do
            for f2 in $f; do
              if [ -f "$f2" ]; then
                git add "$f2"
                if ! git diff --cached --quiet -- "$f2"; then
                  changed=1
                fi
              fi
            done
          done
          if [ "$changed" = "1" ]; then
            git commit -m "chore: update theshy state (multi-account)"
            git pull --rebase origin main || true
            git push || echo "push 失败, 下次 cron 会重试"
            echo "State committed"
          else
            echo "No state changes"
          fi
