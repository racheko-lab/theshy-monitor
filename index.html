<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheShy 排位监控 · 完整数据</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-2: #1c2128;
    --border: #30363d;
    --border-2: #21262d;
    --text: #c9d1d9;
    --text-bright: #f0f6fc;
    --muted: #8b949e;
    --muted-2: #6e7681;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #db6d28;
    --purple: #bc8cff;
    --tier-challenger: #5b6ee1;
    --tier-grandmaster: #e02c2c;
    --tier-master: #a335ee;
    --tier-diamond: #5b9bd5;
    --tier-emerald: #00bfa5;
    --tier-platinum: #4ec9b0;
    --tier-gold: #ff9b3a;
    --tier-silver: #b6c3cf;
    --tier-bronze: #c08e55;
    --tier-iron: #8a8a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(88,166,255,0.15), transparent 70%);
    pointer-events: none;
  }
  .hero-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    border: 3px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
  }
  .hero-info { flex: 1; min-width: 0; }
  .hero h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text-bright);
  }
  .hero .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .hero-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
  }
  .tag.online { background: rgba(63,185,80,0.15); color: var(--green); border-color: rgba(63,185,80,0.4); }
  .tag.offline { background: rgba(139,148,158,0.15); color: var(--muted); }
  .tag.unknown { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tag.level { background: rgba(88,166,255,0.15); color: var(--accent); }
  .tag.ladder { background: rgba(188,140,255,0.15); color: var(--purple); }
  .tag .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Sections */
  .section { margin-bottom: 16px; }
  .section-title {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title .meta {
    font-size: 11px;
    color: var(--muted-2);
    text-transform: none;
    letter-spacing: 0;
  }

  /* 折叠 section */
  .section-collapse { margin-top: 24px; }
  .section-title-collapse {
    cursor: pointer;
    list-style: none;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title-collapse::-webkit-details-marker { display: none; }
  .section-title-collapse::after {
    content: '▶ 点击展开';
    font-size: 11px;
    color: var(--muted-2);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    margin-left: 12px;
  }
  details[open] > .section-title-collapse::after { content: '▼ 点击收起'; }
  .subsection { margin-top: 12px; }
  .subsection:first-of-type { margin-top: 4px; }
  .subsection-title {
    margin-top: 16px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-2);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-2);
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .card-meta {
    font-size: 11px;
    color: var(--muted);
  }
  .kv {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 3px 0;
  }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text-bright); font-weight: 500; }

  /* Tier display */
  .tier-card {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tier-img {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--card-2);
  }
  .tier-info {
    flex: 1;
  }
  .tier-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 2px;
  }
  .tier-name.tier-CHALLENGER { color: var(--tier-challenger); }
  .tier-name.tier-GRANDMASTER { color: var(--tier-grandmaster); }
  .tier-name.tier-MASTER { color: var(--tier-master); }
  .tier-name.tier-DIAMOND { color: var(--tier-diamond); }
  .tier-name.tier-EMERALD { color: var(--tier-emerald); }
  .tier-name.tier-PLATINUM { color: var(--tier-platinum); }
  .tier-name.tier-GOLD { color: var(--tier-gold); }
  .tier-name.tier-SILVER { color: var(--tier-silver); }
  .tier-name.tier-BRONZE { color: var(--tier-bronze); }
  .tier-name.tier-IRON { color: var(--tier-iron); }
  .tier-name.tier-None { color: var(--muted); }
  .tier-stats { font-size: 12px; color: var(--muted); }
  .tier-stats .lp { color: var(--accent); font-weight: 600; }
  .tier-stats .win { color: var(--green); }
  .tier-stats .lose { color: var(--red); }
  .tier-stats .wr { color: var(--text-bright); }

  .high-leagues {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border-2);
    font-size: 11px;
    color: var(--muted);
  }
  .high-leagues div { margin-top: 2px; }

  /* Champion table */
  .champ-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .champ-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .champ-table td {
    padding: 8px;
    border-bottom: 1px solid var(--border-2);
    vertical-align: middle;
  }
  .champ-table tr:last-child td { border-bottom: none; }
  .champ-table tr:hover td { background: var(--card-2); }
  .champ-row { cursor: pointer; }
  .champ-detail td { background: var(--card-2); padding: 12px 16px; }
  .champ-detail .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px 16px;
  }
  .champ-detail .kv { display: flex; gap: 8px; font-size: 11px; }
  .champ-detail .k { color: var(--muted); min-width: 80px; }
  .champ-detail .v { color: var(--text); font-family: var(--mono); }
  .champ-name {
    font-weight: 600;
    color: var(--text-bright);
  }
  .champ-meta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 1px;
  }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill.win { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill.lose { background: rgba(248,81,73,0.15); color: var(--red); }
  .pill.kda { background: rgba(88,166,255,0.15); color: var(--accent); }
  .pill.op { background: rgba(188,140,255,0.15); color: var(--purple); }
  .pill.mvp { background: rgba(255,155,58,0.15); color: var(--orange); }

  /* Event list */
  .events {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-2);
    font-size: 13px;
  }
  .event-item:last-child { border-bottom: none; }
  .event-item .icon { font-size: 16px; line-height: 1.4; }
  .event-item .body { flex: 1; min-width: 0; }
  .event-item .title { font-weight: 600; margin-bottom: 1px; }
  .event-item .meta { font-size: 11px; color: var(--muted); }
  .event-item.active .title { color: var(--orange); }
  .event-item.match-win .title { color: var(--green); }
  .event-item.match-lose .title { color: var(--red); }
  .event-item.level .title { color: var(--accent); }
  .event-item.rank .title { color: var(--purple); }
  .event-item.lp-up .title { color: var(--green); }
  .event-item.lp-down .title { color: var(--red); }

  /* Match list */
  .match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .match-result {
    width: 4px;
    height: 40px;
    border-radius: 2px;
  }
  .match-result.win { background: var(--green); }
  .match-result.lose { background: var(--red); }
  .match-info .champ { font-weight: 600; color: var(--text-bright); font-size: 14px; }
  .match-info .meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .match-stats {
    text-align: right;
    font-size: 12px;
  }
  .match-stats .kda { font-weight: 600; color: var(--text-bright); }
  .match-stats .sub { font-size: 11px; color: var(--muted); }
  .match-detail {
    background: var(--card-2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 12px;
    margin: -8px 0 8px;
  }
  .match-row:hover { background: var(--card-2); }

  /* Toolbar */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 12px 0;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 8px;
  }
  .toolbar button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .toolbar button:hover {
    background: var(--border);
    border-color: var(--accent);
  }
  .toolbar select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
  }

  /* Loading + empty */
  .loading, .empty {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab:hover { color: var(--text); }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 32px;
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Number formatting */
  .num-mono { font-variant-numeric: tabular-nums; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .text-accent { color: var(--accent); }
  .text-purple { color: var(--purple); }

  .debug {
    margin-top: 16px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }

  @media (max-width: 640px) {
    .hero { flex-direction: column; text-align: center; }
    .hero-avatar { width: 72px; height: 72px; }
    .hero-tags { justify-content: center; }
    .grid-3 { grid-template-columns: 1fr; }
    .champ-table { font-size: 11px; }
    .champ-table th, .champ-table td { padding: 6px 4px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Hero -->
  <div class="hero">
    <img class="hero-avatar" id="avatar" src="" alt="" onerror="this.style.display='none'">
    <div class="hero-info">
      <h1 id="hero-name">TheShy</h1>
      <div class="hero-tags">
        <span id="status-tag" class="tag unknown">
          <span class="dot"></span>
          <span id="status-text">加载中</span>
        </span>
        <span id="tier-tag" class="tag" style="display:none;">段位 <span id="tier-val">-</span></span>
        <span id="wr-tag" class="tag" style="display:none;">胜率 <span id="wr-val">-</span></span>
        <span id="ladder-tag" class="tag ladder" style="display:none;">排名 <span id="ladder-val">-</span></span>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div>
      <span id="last-fetch">未刷新</span> ·
      <label>自动刷新:
        <select id="refresh-interval">
          <option value="0">关闭</option>
          <option value="30">30s</option>
          <option value="60" selected>1m</option>
          <option value="300">5m</option>
        </select>
      </label> ·
      <span id="check-count">-</span> 次检测
    </div>
    <button id="refresh-btn">立即刷新</button>
  </div>

  <!-- 最近比赛 -->
  <div class="section">
    <div class="section-title">
      最近比赛 · Recent Matches
      <span class="meta" id="matches-meta"></span>
    </div>
    <div id="matches-list">
      <div class="loading"><span class="spinner"></span>加载中...</div>
    </div>
  </div>

  <!-- 事件历史 -->
  <div class="section">
    <div class="section-title">
      事件历史 · Event Log
      <span class="meta" id="events-meta"></span>
    </div>
    <div class="events" id="events-list">
      <div class="empty">暂无事件</div>
    </div>
  </div>

  <!-- 更多数据 (合并折叠) -->
  <details class="section-collapse">
    <summary class="section-title section-title-collapse">更多数据 · More</summary>

    <div class="subsection">
      <div class="section-title subsection-title">最常玩英雄 · Most Champions <span class="meta" id="mc-meta"></span></div>
      <div class="tabs" id="mc-tabs"></div>
      <div id="mc-content">
        <div class="loading"><span class="spinner"></span>加载中...</div>
      </div>
    </div>

    <div class="subsection">
      <div class="section-title subsection-title">赛季历史 · Season History</div>
      <div class="grid-3" id="season-grid">
        <div class="loading"><span class="spinner"></span>加载中...</div>
      </div>
    </div>
  </details>

  <!-- Debug -->
  <details>
    <summary style="cursor:pointer; color:var(--muted); font-size:12px; padding:8px 0;">📦 调试 JSON (state + profile + matches)</summary>
    <div class="debug" id="debug">未加载</div>
  </details>

  <footer>
    数据源:
    <a href="https://mcp-api.op.gg/mcp" target="_blank">OP.GG MCP</a> ·
    <a href="https://www.op.gg/summoners/kr/TheShy" target="_blank">OP.GG TheShy</a> ·
    <a href="https://github.com/racheko-lab/theshy-monitor" target="_blank">GitHub 源码</a>
  </footer>
</div>

<script>
// ============================================================
// 配置
// ============================================================
const params = new URLSearchParams(location.search);
const REPO = params.get('repo') || 'racheko-lab/theshy-monitor';
const BRANCH = params.get('branch') || 'main';
const RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;
const FILES = {
  state:   RAW + '.theshy_opgg_state.json',
  events:  RAW + '.theshy_events.json',
  profile: RAW + '.theshy_profile.json',
  matches: RAW + '.theshy_matches.json',
};
const API_BASE = `https://api.github.com/repos/${REPO}/`;

const TIER_NAMES = {
  CHALLENGER: '王者', GRANDMASTER: '超凡大师', MASTER: '大师',
  DIAMOND: '钻石', EMERALD: '翡翠', PLATINUM: '铂金',
  GOLD: '黄金', SILVER: '白银', BRONZE: '青铜', IRON: '黑铁',
};
const DIVISION_NAMES = { 1: 'I', 2: 'II', 3: 'III', 4: 'IV' };
const GAME_TYPES = {
  SOLORANKED: '单双排', FLEXRANKED: '灵活组排', ARENA: '竞技场',
  NORMAL: '匹配', ARAM: '大乱斗', RANKED: '排位', BOT: '人机',
};
const POSITIONS = {
  TOP: '上单', JUNGLE: '打野', MID: '中单', ADC: 'ADC', SUPPORT: '辅助', NONE: '无'
};

// ============================================================
// 工具函数
// ============================================================
function fmtKst(iso, withSeconds = false) {
  if (!iso) return '-';
  try {
    const dt = new Date(iso);
    const opts = { timeZone: 'Asia/Seoul', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
    if (withSeconds) opts.second = '2-digit';
    return dt.toLocaleString('zh-CN', opts);
  } catch { return iso.slice(0, 16); }
}

function ageString(iso) {
  if (!iso) return '-';
  const ageSec = (Date.now() - new Date(iso).getTime()) / 1000;
  if (ageSec < 60) return `${Math.floor(ageSec)}秒前`;
  if (ageSec < 3600) return `${Math.floor(ageSec/60)}分钟前`;
  if (ageSec < 86400) return `${Math.floor(ageSec/3600)}小时前`;
  return `${Math.floor(ageSec/86400)}天前`;
}

function fmtNum(n, suffix = '') {
  if (n == null || isNaN(n)) return '-';
  n = Number(n);
  if (n >= 10000) return (n/10000).toFixed(1) + 'w' + suffix;
  if (n >= 1000) return (n/1000).toFixed(1) + 'k' + suffix;
  return n + suffix;
}

function fmtDuration(sec) {
  if (!sec) return '-';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}分${s}秒`;
}

function tierName(tier) {
  if (!tier) return '未定级';
  return TIER_NAMES[tier] || tier;
}

function fmtRank(rank, total) {
  if (!rank) return '-';
  const fmt = (n) => n >= 10000 ? (n/10000).toFixed(1) + 'w' : n.toLocaleString();
  if (total) return `${fmt(rank)} / ${fmt(total)}`;
  return fmt(rank);
}

function calcKdaStr(k, d, a) {
  k = +k||0; d = +d||0; a = +a||0;
  if (d === 0) return k+a > 0 ? 'Perfect' : '0.00';
  return ((k+a)/d).toFixed(2);
}

function calcWr(w, p) {
  w = +w||0; p = +p||0;
  if (!p) return '0%';
  return (w/p*100).toFixed(1) + '%';
}

// ============================================================
// 数据获取
// ============================================================
async function fetchJson(url) {
  const u = `${url}?t=${Date.now()}`;
  const r = await fetch(u, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

let currentData = { state: null, events: [], profile: null, matches: [] };

async function refresh() {
  const fetchEl = document.getElementById('last-fetch');
  fetchEl.textContent = '刷新中...';
  try {
    const [state, events, profile, matches] = await Promise.all([
      fetchJson(FILES.state).catch(() => null),
      fetchJson(FILES.events).catch(() => null),
      fetchJson(FILES.profile).catch(() => null),
      fetchJson(FILES.matches).catch(() => null),
    ]);
    currentData = { state, events: events || [], profile, matches: matches || [] };
    renderAll();
    fetchEl.textContent = `最后刷新: ${new Date().toLocaleTimeString('zh-CN')}`;
  } catch (e) {
    fetchEl.textContent = `刷新失败: ${e.message}`;
  }
}

// ============================================================
// 渲染
// ============================================================
function deriveStatus(state, profile) {
  const updated = (profile && profile.updated_at) || (state && state.profile && state.profile.updated_at);
  if (!updated) return { level: 'unknown', text: '无数据' };
  const ageSec = (Date.now() - new Date(updated).getTime()) / 1000;
  if (ageSec < 300) return { level: 'online', text: `游戏中? (${Math.floor(ageSec)}s 前刷新)` };
  if (ageSec < 1800) return { level: 'unknown', text: `可能离线 (${ageString(updated)})` };
  return { level: 'offline', text: `离线 (${ageString(updated)})` };
}

function renderHero() {
  const { state, profile } = currentData;
  const p = profile || (state && state.profile) || {};

  if (p.profile_image_url) {
    const img = document.getElementById('avatar');
    img.src = p.profile_image_url;
    img.style.display = '';
  }
  document.getElementById('hero-name').textContent = p.name || p.game_name || 'TheShy';

  const status = deriveStatus(state, profile);
  const tag = document.getElementById('status-tag');
  tag.className = `tag ${status.level}`;
  document.getElementById('status-text').textContent = status.text;

  // 段位 + 胜率: 取第一个非 ARENA 的 league_stats
  const ls = (p.league_stats || []).filter(l => l.game_type !== 'ARENA');
  if (ls.length) {
    const l = ls[0];
    const tierStr = `${tierName(l.tier)} ${l.division ? (DIVISION_NAMES[l.division] || l.division) : ''} · ${l.lp ?? 0} LP`;
    const tierTag = document.getElementById('tier-tag');
    tierTag.style.display = '';
    tierTag.className = `tag tier-${l.tier}`;
    document.getElementById('tier-val').textContent = tierStr;

    const play = l.play || (l.match_win || 0) + (l.match_lose || 0);
    const wr = play ? ((l.match_win / play) * 100).toFixed(1) : 0;
    document.getElementById('wr-tag').style.display = '';
    document.getElementById('wr-val').textContent =
      `${l.match_win ?? l.win ?? 0}W ${l.match_lose ?? l.lose ?? 0}L · ${wr}%`;
  }

  const lr = p.ladder_rank;
  if (lr && (lr.rank || lr.total)) {
    document.getElementById('ladder-tag').style.display = '';
    document.getElementById('ladder-val').textContent = fmtRank(lr.rank, lr.total);
  }
}

function renderSeasons() {
  const { profile } = currentData;
  if (!profile) {
    document.getElementById('season-grid').innerHTML = '<div class="empty">无赛季数据</div>';
    return;
  }
  const prev = profile.previous_season_tiers || [];
  const seas = profile.previous_seasons || [];
  const allSeasons = {};
  for (const s of seas) allSeasons[s.season_id] = { tier: s.tier, division: s.division, lp: s.lp };
  for (const pst of prev) {
    if (!allSeasons[pst.season_id]) allSeasons[pst.season_id] = {};
    allSeasons[pst.season_id][pst.game_type] = {
      tier: pst.tier, division: pst.division, lp: pst.lp, win: pst.win, lose: pst.lose,
      high_tier: pst.high_tier, high_division: pst.high_division, high_lp: pst.high_lp,
      created_at: pst.created_at,
    };
  }
  const seasons = Object.keys(allSeasons).sort((a, b) => b - a);
  if (seasons.length === 0) {
    document.getElementById('season-grid').innerHTML = '<div class="empty">无历史赛季</div>';
    return;
  }
  document.getElementById('season-grid').innerHTML = seasons.map(sid => {
    const s = allSeasons[sid];
    let parts = [];
    if (s.tier) parts.push(`<div class="tier-name tier-${s.tier}">${tierName(s.tier)} ${s.division ? DIVISION_NAMES[s.division]||s.division : ''} <span class="card-meta">LP ${s.lp ?? 0}</span></div>`);
    for (const gt of ['SOLORANKED', 'FLEXRANKED']) {
      if (s[gt]) {
        const x = s[gt];
        const highStr = x.high_tier ? ` · 最高 ${tierName(x.high_tier)} ${x.high_division||''} (${x.high_lp} LP)` : '';
        parts.push(`<div class="kv"><span class="k">${GAME_TYPES[gt]}</span><span class="v tier-${x.tier}">${tierName(x.tier)} ${x.division?DIVISION_NAMES[x.division]||x.division:''} · ${x.win||0}W ${x.lose||0}L${highStr}</span></div>`);
      }
    }
    return `<div class="card"><div class="card-header"><div class="card-title">S${sid}</div></div>${parts.join('')}</div>`;
  }).join('');
}

    ['控制敌人时长', m.time_ccing_others != null ? `${m.time_ccing_others}s` : null],

        <div style="display:flex; flex-wrap:wrap; gap:6px;">

        </div>

  // 召唤师技能

    rows.push(`
      <div class="card">
        <div class="card-header"><div class="card-title">召唤师技能</div></div>
        <div style="display:flex; gap:6px;">
          ${m.spells.map(s => `<span class="pill" style="background:rgba(88,166,255,0.15); color:var(--accent);">${SPELLS[s] || `技能${s}`}</span>`).join('')}
        </div>
      </div>
    `);
  }

  // 符文
  if (m.rune) {
    const RUNE_PAGES = { 8000:'精密', 8100:'主宰', 8200:'巫术', 8300:'灵感', 8400:'坚决' };
    const r = m.rune;
    const primary = RUNE_PAGES[r.primary_page_id] || r.primary_page_id;
    const secondary = RUNE_PAGES[r.secondary_page_id] || r.secondary_page_id;
    const primaryRune = r.primary_rune_id || '-';
    rows.push(`
      <div class="card">
        <div class="card-header"><div class="card-title">符文</div></div>
        <div class="kv"><span class="k">主系</span><span class="v">${primary} (基石 ${primaryRune})</span></div>
        <div class="kv"><span class="k">副系</span><span class="v">${secondary}</span></div>
      </div>
    `);

  // 双方队伍
  if (m.teams && m.teams.length) {
    const teamsHtml = m.teams.map(t => {
      const gs = t.game_stat || {};
      const winStr = gs.is_win === 'true' ? ' · 胜' : '';
      const side = t.key === 'BLUE' ? '蓝方' : (t.key === 'RED' ? '红方' : t.key);
      const bans = (t.banned_champions_names || []).join(', ');
      return `

          <div class="card-header"><div class="card-title">${side}${winStr}</div></div>
          <div class="kv"><span class="k">击杀</span><span class="v">${gs.champion_kill ?? '-'}</span></div>
          <div class="kv"><span class="k">塔</span><span class="v">${gs.tower_kill ?? '-'}</span></div>
          <div class="kv"><span class="k">龙</span><span class="v">${gs.dragon_kill ?? '-'}</span></div>
          <div class="kv"><span class="k">大龙</span><span class="v">${gs.baron_kill ?? '-'}</span></div>
          <div class="kv"><span class="k">水晶</span><span class="v">${gs.inhibitor_kill ?? '-'}</span></div>
          <div class="kv"><span class="k">先锋</span><span class="v">${gs.rift_herald_kill ?? '-'}</span></div>
          <div class="kv"><span class="k">阿塔坎</span><span class="v">${gs.atakhan_kill ?? '-'}</span></div>
          <div class="kv"><span class="k">金币</span><span class="v">${gs.gold_earned ? fmtNum(gs.gold_earned) : '-'}</span></div>
          <div class="kv"><span class="k">禁用</span><span class="v">${bans || '-'}</span></div>

        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 12px;">
          ${teamsHtml}
        </div>
      </div>
    `);
  }

  return `<div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px;">${rows.join('')}</div>`;
}

let mcTabIndex = 0;
function renderMostChampions() {
  const { profile } = currentData;
  if (!profile) return;

  const tabs = [];
  if (profile.most_champions && profile.most_champions.champion_stats && profile.most_champions.champion_stats.length) {
    tabs.push({ key: 'mc', label: `赛季总览 (${profile.most_champions.play||0}场)`, data: profile.most_champions, type: 'season' });
  }
  if (profile.ranked_most_champions && profile.ranked_most_champions.my_champion_stats && profile.ranked_most_champions.my_champion_stats.length) {
    tabs.push({ key: 'rmc', label: `排位专属 (${profile.ranked_most_champions.play||0}场)`, data: profile.ranked_most_champions, type: 'ranked' });
  }
  if (profile.recent_champion_stats && profile.recent_champion_stats.length) {
    tabs.push({ key: 'rcs', label: `近期 (${profile.recent_champion_stats.length}英雄)`, data: profile.recent_champion_stats, type: 'recent' });
  }

  if (tabs.length === 0) {
    document.getElementById('mc-tabs').innerHTML = '';
    document.getElementById('mc-content').innerHTML = '<div class="empty">无英雄数据</div>';
    return;
  }
  if (mcTabIndex >= tabs.length) mcTabIndex = 0;

  document.getElementById('mc-tabs').innerHTML = tabs.map((t, i) =>
    `<div class="tab ${i === mcTabIndex ? 'active' : ''}" data-idx="${i}">${t.label}</div>`
  ).join('');
  document.querySelectorAll('#mc-tabs .tab').forEach(el => {
    el.onclick = () => { mcTabIndex = +el.dataset.idx; renderMostChampions(); };
  });

  const t = tabs[mcTabIndex];
  document.getElementById('mc-meta').textContent = `S${t.data.season_id || '-'} · ${t.data.game_type ? (GAME_TYPES[t.data.game_type]||t.data.game_type) : ''}`;

  let html = '';
  if (t.type === 'season') {
    html = renderSeasonChampTable(t.data);
  } else if (t.type === 'ranked') {
    html = renderRankedChampTable(t.data);
  } else if (t.type === 'recent') {
    html = renderRecentChampTable(t.data);
  }
  document.getElementById('mc-content').innerHTML = html;

  // 绑定点击展开/收起事件
  document.querySelectorAll('#mc-content .champ-row').forEach(row => {
    row.onclick = () => {
      const idx = row.dataset.idx;
      const detail = document.querySelector(`#mc-content .champ-detail[data-detail="${idx}"]`);
      if (detail) detail.style.display = detail.style.display === 'none' ? '' : 'none';
    };
  });
}

                <div class="champ-meta">CC ${c.cc_score||'-'} · 救人 ${c.save_ally||0}</div>
              </td>
            </tr>
            <tr class="champ-detail" style="display:none;" data-detail="${i}">
              <td colspan="12">
                <div class="detail-grid">
                  ${detail.map(([k, v]) => `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}
                </div>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    <div class="champ-meta" style="margin-top:8px;">💡 点击任意行展开查看完整数据 (35+ 字段)</div>
  `;
}

function renderRecentChampTable(rcs) {
  if (!rcs || rcs.length === 0) return '<div class="empty">无近期英雄数据</div>';
  return `
    <table class="champ-table">
      <thead>
        <tr>
          <th>英雄</th>
          <th>场次</th>
          <th>胜场</th>
          <th>K</th><th>D</th><th>A</th>
        </tr>
      </thead>
      <tbody>
        ${rcs.map(c => `
          <tr>
            <td class="champ-name">${c.champion_name || '?'}</td>
            <td class="num-mono">${c.play||0}</td>
            <td class="num-mono">${c.win||0}</td>
            <td class="num-mono">${c.kill||0}</td>
            <td class="num-mono">${c.death||0}</td>
            <td class="num-mono">${c.assist||0}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderEvents() {
  const { events } = currentData;
  if (!events || events.length === 0) {
    document.getElementById('events-list').innerHTML = '<div class="empty">暂无事件 (TheShy 上线/打完排位会出现在这里)</div>';
    return;
  }
  document.getElementById('events-meta').textContent = `${events.length} 条`;
  document.getElementById('events-list').innerHTML = events.slice(0, 100).map(ev => {
    let cls = 'event-item';
    let icon = '📨';
    let title = ev.type;
    let meta = fmtKst(ev.timestamp, true);
    if (ev.type === 'became_active' || ev.type === 'opgg_updated') {
      cls += ' active';
      icon = '🔥';
      title = 'TheShy 可能开始排位了';
      meta = `OP.GG 更新: ${fmtKst(ev.updated_at)} · ${ageString(ev.updated_at)}`;
    } else if (ev.type === 'new_match') {
      cls += ev.result === 'WIN' ? ' match-win' : ' match-lose';
      icon = ev.result === 'WIN' ? '🏆' : '💔';
      title = `${GAME_TYPES[ev.game_type]||ev.game_type} · ${ev.champion} · ${ev.result}`;
      meta = `KDA ${ev.kda} (${ev.kill}/${ev.death}/${ev.assist}) · ${fmtKst(ev.created_at)}`;
    } else if (ev.type === 'level_changed') {
      cls += ' level';
      icon = '📈';
      title = `等级 ${ev.old ?? '-'} → ${ev.new}`;
    } else if (ev.type === 'rank_changed') {
      cls += ' rank';
      icon = '🏆';
      title = `段位变化: ${ev.old} → ${ev.new}`;
      meta = `${GAME_TYPES[ev.game_type]||ev.game_type} · ${fmtKst(ev.timestamp)}`;
    } else if (ev.type === 'lp_changed') {
      const sign = ev.delta >= 0 ? '+' : '';
      cls += ev.delta >= 0 ? ' lp-up' : ' lp-down';
      icon = ev.delta >= 0 ? '📈' : '📉';
      title = `LP ${ev.old_lp} → ${ev.new_lp} (${sign}${ev.delta})`;
      meta = `${GAME_TYPES[ev.game_type]||ev.game_type} · ${tierName(ev.tier)} ${ev.division ? (DIVISION_NAMES[ev.division]||ev.division) : ''} · ${fmtKst(ev.timestamp)}`;
    } else if (ev.type === 'error') {
      icon = '⚠️';
      title = '监控错误';
      meta = ev.msg || '';
    } else if (ev.type === 'system_initialized') {
      icon = '🚀';
      title = ev.msg || '监控启动';
    }
    return `
      <div class="${cls}">
        <div class="icon">${icon}</div>
        <div class="body">
          <div class="title">${title}</div>
          <div class="meta">${meta}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderDebug() {
  const { state, profile, matches } = currentData;
  const dbg = document.getElementById('debug');
  if (!state && !profile) {
    dbg.textContent = '未加载到任何数据, 检查 raw URL 是否可访问';
    return;
  }
  const summary = {
    state_keys: state ? Object.keys(state) : [],
    state_last_check: state && state.last_check,
    state_is_active: state && state.is_active,
    profile_keys: profile ? Object.keys(profile) : [],
    profile_updated_at: profile && profile.updated_at,
    matches_count: matches ? matches.length : 0,
  };
  dbg.textContent = JSON.stringify(summary, null, 2);
}

function renderAll() {
  renderHero();
  renderMatches();
  renderEvents();
  renderSeasons();
  renderMostChampions();
  renderDebug();
}

// ============================================================
// commit count
// ============================================================
async function fetchCommitCount() {
  try {
    const r = await fetch(`${API_BASE}commits?per_page=1`, { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!r.ok) return;
    const link = r.headers.get('Link') || '';
    const m = link.match(/page=(\d+)>; rel="last"/);
    const count = m ? parseInt(m[1]) : 1;
    document.getElementById('check-count').textContent = count;
  } catch {}
}

// ============================================================
// 自动刷新
// ============================================================
let timer = null;
function setupAuto() {
  const sel = document.getElementById('refresh-interval');
  sel.addEventListener('change', () => {
    const sec = parseInt(sel.value);
    if (timer) { clearInterval(timer); timer = null; }
    if (sec > 0) timer = setInterval(refresh, sec * 1000);
  });
}

document.getElementById('refresh-btn').addEventListener('click', refresh);

setupAuto();
refresh();
fetchCommitCount();
setInterval(fetchCommitCount, 60000);
</script>
