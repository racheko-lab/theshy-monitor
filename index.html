<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheShy 排位监控 · 完整数据</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-2: #1c2128;
    --border: #30363d;
    --border-2: #21262d;
    --text: #c9d1d9;
    --text-bright: #f0f6fc;
    --muted: #8b949e;
    --muted-2: #6e7681;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #db6d28;
    --purple: #bc8cff;
    --tier-challenger: #5b6ee1;
    --tier-grandmaster: #e02c2c;
    --tier-master: #a335ee;
    --tier-diamond: #5b9bd5;
    --tier-emerald: #00bfa5;
    --tier-platinum: #4ec9b0;
    --tier-gold: #ff9b3a;
    --tier-silver: #b6c3cf;
    --tier-bronze: #c08e55;
    --tier-iron: #8a8a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(88,166,255,0.15), transparent 70%);
    pointer-events: none;
  }
  .hero-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    border: 3px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
  }
  .hero-info { flex: 1; min-width: 0; }
  .hero h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text-bright);
  }
  .hero .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .hero-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
  }
  .tag.online { background: rgba(63,185,80,0.15); color: var(--green); border-color: rgba(63,185,80,0.4); }
  .tag.offline { background: rgba(139,148,158,0.15); color: var(--muted); }
  .tag.unknown { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tag.level { background: rgba(88,166,255,0.15); color: var(--accent); }
  .tag.ladder { background: rgba(188,140,255,0.15); color: var(--purple); }
  .tag .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Sections */
  .section { margin-bottom: 16px; }
  .section-title {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title .meta {
    font-size: 11px;
    color: var(--muted-2);
    text-transform: none;
    letter-spacing: 0;
  }

  /* 折叠 section */
  .section-collapse { margin-top: 24px; }
  .section-title-collapse {
    cursor: pointer;
    list-style: none;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title-collapse::-webkit-details-marker { display: none; }
  .section-title-collapse::after {
    content: '▶ 点击展开';
    font-size: 11px;
    color: var(--muted-2);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    margin-left: 12px;
  }
  details[open] > .section-title-collapse::after { content: '▼ 点击收起'; }
  .subsection { margin-top: 12px; }
  .subsection:first-of-type { margin-top: 4px; }
  .subsection-title {
    margin-top: 16px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-2);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-2);
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .card-meta {
    font-size: 11px;
    color: var(--muted);
  }
  .kv {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 3px 0;
  }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text-bright); font-weight: 500; }

  /* Tier display */
  .tier-card {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tier-img {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--card-2);
  }
  .tier-info {
    flex: 1;
  }
  .tier-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 2px;
  }
  .tier-name.tier-CHALLENGER { color: var(--tier-challenger); }
  .tier-name.tier-GRANDMASTER { color: var(--tier-grandmaster); }
  .tier-name.tier-MASTER { color: var(--tier-master); }
  .tier-name.tier-DIAMOND { color: var(--tier-diamond); }
  .tier-name.tier-EMERALD { color: var(--tier-emerald); }
  .tier-name.tier-PLATINUM { color: var(--tier-platinum); }
  .tier-name.tier-GOLD { color: var(--tier-gold); }
  .tier-name.tier-SILVER { color: var(--tier-silver); }
  .tier-name.tier-BRONZE { color: var(--tier-bronze); }
  .tier-name.tier-IRON { color: var(--tier-iron); }
  .tier-name.tier-None { color: var(--muted); }
  .tier-stats { font-size: 12px; color: var(--muted); }
  .tier-stats .lp { color: var(--accent); font-weight: 600; }
  .tier-stats .win { color: var(--green); }
  .tier-stats .lose { color: var(--red); }
  .tier-stats .wr { color: var(--text-bright); }

  .high-leagues {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border-2);
    font-size: 11px;
    color: var(--muted);
  }
  .high-leagues div { margin-top: 2px; }

  /* Champion table */
  .champ-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .champ-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .champ-table td {
    padding: 8px;
    border-bottom: 1px solid var(--border-2);
    vertical-align: middle;
  }
  .champ-table tr:last-child td { border-bottom: none; }
  .champ-table tr:hover td { background: var(--card-2); }
  .champ-row { cursor: pointer; }
  .champ-detail td { background: var(--card-2); padding: 12px 16px; }
  .champ-detail .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px 16px;
  }
  .champ-detail .kv { display: flex; gap: 8px; font-size: 11px; }
  .champ-detail .k { color: var(--muted); min-width: 80px; }
  .champ-detail .v { color: var(--text); font-family: var(--mono); }
  .champ-name {
    font-weight: 600;
    color: var(--text-bright);
  }
  .champ-meta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 1px;
  }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill.win { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill.lose { background: rgba(248,81,73,0.15); color: var(--red); }
  .pill.kda { background: rgba(88,166,255,0.15); color: var(--accent); }
  .pill.op { background: rgba(188,140,255,0.15); color: var(--purple); }
  .pill.mvp { background: rgba(255,155,58,0.15); color: var(--orange); }

  /* Event list */
  .events {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-2);
    font-size: 13px;
  }
  .event-item:last-child { border-bottom: none; }
  .event-item .icon { font-size: 16px; line-height: 1.4; }
  .event-item .body { flex: 1; min-width: 0; }
  .event-item .title { font-weight: 600; margin-bottom: 1px; }
  .event-item .meta { font-size: 11px; color: var(--muted); }
  .event-item.active .title { color: var(--orange); }
  .event-item.match-win .title { color: var(--green); }
  .event-item.match-lose .title { color: var(--red); }
  .event-item.level .title { color: var(--accent); }
  .event-item.rank .title { color: var(--purple); }
  .event-item.lp-up .title { color: var(--green); }
  .event-item.lp-down .title { color: var(--red); }

  /* Match list - 电竞GG堂风格 */
  .g-match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
    border-left: 4px solid var(--border);
    position: relative;
  }
  .g-match.g-win-bg {
    border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(88,166,255,0.06) 0%, var(--card) 60%);
  }
  .g-match.g-lose-bg {
    border-left-color: var(--red);
    background: linear-gradient(90deg, rgba(248,81,73,0.06) 0%, var(--card) 60%);
  }
  .g-match:hover { background: var(--card-2); }
  .g-match.g-win-bg:hover { background: linear-gradient(90deg, rgba(88,166,255,0.1) 0%, var(--card-2) 60%); }
  .g-match.g-lose-bg:hover { background: linear-gradient(90deg, rgba(248,81,73,0.1) 0%, var(--card-2) 60%); }

  .g-champ-col { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .g-champ-wrap { position: relative; }
  .g-champ-icon {
    width: 48px; height: 48px;
    border-radius: 6px;
    border: 1px solid var(--border);
    display: block;
  }
  .g-champ-lv {
    position: absolute;
    bottom: -2px; right: -2px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 10px;
    padding: 1px 3px;
    border-radius: 3px;
    font-weight: 600;
    min-width: 14px;
    text-align: center;
  }
  .g-result-badge {
    position: absolute;
    top: -2px; left: -2px;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    line-height: 1;
  }
  .g-win-badge { background: var(--accent); color: #fff; }
  .g-lose-badge { background: var(--red); color: #fff; }

  .g-spells { display: flex; flex-direction: column; gap: 2px; }
  .spell-icon {
    width: 22px; height: 22px;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: block;
  }
  .spell-icon-sm {
    width: 18px; height: 18px;
    border-radius: 3px;
    border: 1px solid var(--border-2);
  }

  .g-info-col { flex: 1; min-width: 0; }
  .g-topline { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); margin-bottom: 2px; flex-wrap: wrap; }
  .g-type { font-weight: 600; color: var(--text); font-size: 12px; }
  .g-time { font-size: 11px; }

  .g-kda-line { display: flex; align-items: baseline; gap: 2px; font-size: 16px; font-weight: 700; }
  .g-kda-num { font-variant-numeric: tabular-nums; color: var(--text-bright); }
  .g-kda-num.g-death { color: var(--red); }
  .g-kda-sep { color: var(--muted-2); font-weight: 400; margin: 0 1px; }
  .g-kda-ratio { font-size: 11px; margin-left: 6px; font-weight: 600; }

  .g-sub-line { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .g-items-col { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
  .g-items { display: flex; gap: 2px; }
  .item-icon {
    width: 26px; height: 26px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--card-2);
  }
  .item-icon-sm {
    width: 22px; height: 22px;
    border-radius: 3px;
    border: 1px solid var(--border-2);
    background: var(--card-2);
  }
  .g-mini-champs { display: flex; gap: 8px; align-items: center; }
  .g-mini-team { display: flex; gap: 2px; }
  .mini-champ {
    width: 18px; height: 18px;
    border-radius: 3px;
    border: 1px solid var(--border);
    display: block;
  }
  .g-mini-team.g-enemy { opacity: 0.75; }
  .g-vs {
    font-size: 9px;
    color: var(--muted-2);
    font-weight: 700;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .g-arrow {
    font-size: 10px;
    color: var(--muted-2);
    flex-shrink: 0;
    margin-left: 4px;
    transition: transform 0.2s;
  }

  /* 排名徽章 */
  .rank-badge {
    display: inline-block;
    background: rgba(139,148,158,0.2);
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 4px;
    font-variant-numeric: tabular-nums;
  }
  .rank-badge.mvp { background: rgba(255,155,58,0.2); color: var(--orange); }
  .rank-badge.svp { background: rgba(88,166,255,0.2); color: var(--accent); }

  /* 展开详情 */
  .g-match-detail {
    background: var(--card-2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    margin: -6px 0 6px;
    overflow: hidden;
  }
  .g-detail-wrap { padding: 8px; }
  .g-avg-tier { text-align: center; font-size: 12px; color: var(--muted); padding: 6px 0; border-bottom: 1px solid var(--border-2); margin-bottom: 4px; }

  .g-team-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 700;
    border-radius: 4px;
    margin: 4px 0;
  }
  .g-th-win { background: rgba(88,166,255,0.12); color: var(--accent); }
  .g-th-lose { background: rgba(248,81,73,0.1); color: var(--red); }
  .g-th-side { min-width: 40px; }
  .g-th-kills { font-size: 16px; font-variant-numeric: tabular-nums; }
  .g-th-objs { font-size: 11px; font-weight: 400; color: var(--muted); flex: 1; display: flex; gap: 10px; }
  .obj-icon {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    white-space: nowrap;
  }
  .obj-gold { color: var(--yellow); background: rgba(210,153,34,0.12); }
  .obj-fb { color: var(--red); background: rgba(248,81,73,0.12); font-weight: 600; }
  .g-th-result { font-size: 11px; font-weight: 600; }

  .g-p-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    font-size: 11px;
    border-bottom: 1px solid var(--border-2);
  }
  .g-p-row:last-child { border-bottom: none; }
  .g-p-row.g-me { background: rgba(88,166,255,0.08); }
  .g-p-win { border-left: 2px solid transparent; }
  .g-p-lose { border-left: 2px solid transparent; }
  .g-p-row.g-me.g-p-win { border-left-color: var(--accent); }
  .g-p-row.g-me.g-p-lose { border-left-color: var(--red); }

  .g-p-champ { position: relative; flex-shrink: 0; }
  .g-p-icon { width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border); }
  .g-p-lv { position: absolute; bottom: -1px; right: -1px; background: rgba(0,0,0,0.8); color: #fff; font-size: 9px; padding: 0 2px; border-radius: 2px; font-weight: 600; }
  .g-p-spells { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
  .g-p-name { min-width: 110px; max-width: 140px; flex-shrink: 1; }
  .g-p-id {
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .g-me-name { color: var(--accent); }
  .g-p-pos { font-size: 10px; color: var(--muted); }
  .g-p-kda { min-width: 80px; text-align: center; flex-shrink: 0; }
  .g-kda-sm-wrap { font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }
  .g-kda-sm { color: var(--text-bright); }
  .g-kda-sm-win { color: var(--text-bright); }
  .g-kda-sm-lose { color: var(--text); }
  .g-kda-sm-death { color: var(--red); }
  .g-kda-sm-sep { color: var(--muted-2); font-weight: 400; margin: 0 1px; }
  .g-kda-ratio-sm { display: block; font-size: 10px; color: var(--muted); font-weight: 400; }
  .g-p-items { display: flex; gap: 1px; flex-shrink: 0; }
  .item-empty {
    background: rgba(255,255,255,0.03);
    border: 1px dashed var(--border-2);
    display: inline-block;
  }
  .g-p-dmg { flex: 1; min-width: 100px; }
  .g-dmg-bar-wrap {
    height: 4px;
    background: var(--border-2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 2px;
  }
  .g-taken-wrap {
    height: 3px;
    opacity: 0.5;
    margin-bottom: 2px;
  }
  .g-dmg-bar { height: 100%; border-radius: 2px; }
  .g-dmg-bar-out { height: 100%; }
  .g-dmg-bar-taken { background: var(--muted-2); }
  .g-dmg-win { background: var(--accent); }
  .g-dmg-lose { background: var(--red); opacity: 0.7; }
  .g-dmg-num { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .mk-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 0 3px;
    border-radius: 2px;
    margin-left: 2px;
    line-height: 14px;
    vertical-align: middle;
  }
  .mk-2 { background: rgba(88,166,255,0.2); color: var(--accent); }
  .mk-3 { background: rgba(188,140,255,0.2); color: var(--purple); }
  .mk-4 { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .mk-5 { background: rgba(248,81,73,0.2); color: var(--red); }
  .op-score {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 0 3px;
    border-radius: 2px;
    background: rgba(63,185,80,0.15);
    color: var(--green);
    margin-left: 2px;
    line-height: 14px;
    vertical-align: middle;
  }

  .g-bans { display: flex; gap: 4px; padding: 6px 8px; align-items: center; flex-wrap: wrap; border-top: 1px dashed var(--border-2); margin-top: 2px; }
  .g-bans-label { font-size: 10px; color: var(--muted); margin-right: 4px; }
  .ban-wrap { position: relative; }
  .ban-icon { width: 20px; height: 20px; border-radius: 3px; border: 1px solid var(--border); opacity: 0.5; display: block; filter: grayscale(0.5); }
  .ban-x {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--red);
    font-size: 14px;
    font-weight: 700;
    text-shadow: 0 0 2px rgba(0,0,0,0.8);
    pointer-events: none;
  }

  @media (max-width: 640px) {
    .g-match { flex-wrap: wrap; gap: 6px; padding: 8px; }
    .g-items-col { width: 100%; flex-direction: row-reverse; justify-content: space-between; align-items: center; }
    .g-champ-icon { width: 40px; height: 40px; }

    .g-p-name { min-width: 70px; max-width: 90px; }
    .g-p-items { display: none; }
    .g-p-dmg { display: none; }
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 12px 0;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 8px;
  }
  .toolbar button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .toolbar button:hover {
    background: var(--border);
    border-color: var(--accent);
  }
  .toolbar select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
  }

  /* Loading + empty */
  .loading, .empty {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;

  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs {
    display: flex;
    gap: 4px;

    margin-bottom: 12px;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab:hover { color: var(--text); }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 32px;
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Number formatting */
  .num-mono { font-variant-numeric: tabular-nums; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .text-accent { color: var(--accent); }
  .text-purple { color: var(--purple); }

  .debug {
    margin-top: 16px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;

  @media (max-width: 640px) {
    .hero { flex-direction: column; text-align: center; }

    .hero-tags { justify-content: center; }
    .grid-3 { grid-template-columns: 1fr; }
    .champ-table { font-size: 11px; }
    .champ-table th, .champ-table td { padding: 6px 4px; }

</style>

<script>
// ============================================================
// 配置
// ============================================================
const params = new URLSearchParams(location.search);
const REPO = params.get('repo') || 'racheko-lab/theshy-monitor';
const BRANCH = params.get('branch') || 'main';
const forceLocal = params.get('local') === '1' || location.port === '8000' || location.protocol === 'file:';
const isLocal = forceLocal || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const RAW = isLocal ? './' : `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;
const FILES = {
  state:   RAW + '.theshy_opgg_state.json',
  events:  RAW + '.theshy_events.json',
  profile: RAW + '.theshy_profile.json',
  matches: RAW + '.theshy_matches.json',
};
const API_BASE = `https://api.github.com/repos/${REPO}/`;

const TIER_NAMES = {
  CHALLENGER: '王者', GRANDMASTER: '超凡大师', MASTER: '大师',
  DIAMOND: '钻石', EMERALD: '翡翠', PLATINUM: '铂金',
  GOLD: '黄金', SILVER: '白银', BRONZE: '青铜', IRON: '黑铁',
};
const DIVISION_NAMES = { 1: 'I', 2: 'II', 3: 'III', 4: 'IV' };
const GAME_TYPES = {
  SOLORANKED: '单双排', FLEXRANKED: '灵活组排', ARENA: '竞技场',
  NORMAL: '匹配', ARAM: '大乱斗', RANKED: '排位', BOT: '人机',
};
const POSITIONS = {
  TOP: '上单', JUNGLE: '打野', MID: '中单', ADC: 'ADC', SUPPORT: '辅助', NONE: '无'
};

// ============================================================
// 图标 CDN (使用 CommunityDragon + OPGG + DataDragon)
// ============================================================
const DD_VER = '16.14.1';
const CD_DD = `https://ddragon.leagueoflegends.com/cdn/${DD_VER}`;
const CD_CD = 'https://cdn.communitydragon.org/latest';
const CD_OPGG = 'https://opgg-static.akamaized.net/images/lol';

const IMG_ERR = "this.style.opacity=0.3;this.style.filter='grayscale(1)';this.onerror=null;";
function champIcon(id) { return id ? `${CD_CD}/champion/${id}/square` : ''; }
function itemIcon(id) { return id ? `${CD_DD}/img/item/${id}.png` : ''; }
function perkIcon(id) { return id ? `${CD_OPGG}/perk/${id}.png` : ''; }
function perkStyleIcon(id) { return id ? `${CD_OPGG}/perkStyle/${id}.png` : ''; }
function runeIconHtml(rune, cls) {
  if (!rune) return '';
  const c = cls || 'spell-icon';
  const isSm = c === 'spell-icon-sm';
  let primary = '';
  if (rune.primary_rune_id) {
    const pri = perkIcon(rune.primary_rune_id);
    const fb = rune.primary_page_id ? perkStyleIcon(rune.primary_page_id) : '';
    if (fb) {
      primary = `<img class="${c}" src="${pri}" alt="" onerror="this.onerror=null;this.src='${fb}';this.onerror=function(){this.style.opacity=0.3;this.style.filter='grayscale(1)';this.onerror=null;};">`;
    } else {
      primary = `<img class="${c}" src="${pri}" alt="" onerror="${IMG_ERR}">`;
    }
  } else if (rune.primary_page_id) {
    primary = `<img class="${c}" src="${perkStyleIcon(rune.primary_page_id)}" alt="" onerror="${IMG_ERR}">`;
  }
  if (rune.secondary_page_id && primary) {
    const sub = perkStyleIcon(rune.secondary_page_id);
    const subCls = isSm ? 'sub-rune-sm' : 'sub-rune';
    return `<span class="rune-wrap" style="position:relative;display:inline-block;">${primary}<img class="${subCls}" src="${sub}" alt="" onerror="${IMG_ERR}" style="position:absolute;bottom:-2px;right:-4px;width:${isSm?10:12}px;height:${isSm?10:12}px;border-radius:50%;border:1px solid var(--bg);background:var(--card-2);"></span>`;
  }
  return primary;
}

const SUMMONER_SPELL_FILES = {
  1:'SummonerBoost', 3:'SummonerExhaust', 4:'SummonerFlash', 6:'SummonerHaste',
  7:'SummonerHeal', 11:'SummonerSmite', 12:'SummonerTeleport', 14:'SummonerDot',
  13:'SummonerMana', 21:'SummonerBarrier', 30:'SummonerPoroRecall', 31:'SummonerPoroThrow',
  32:'SummonerSnowball', 39:'SummonerSnowURFSnowball_Mark'
};
const SUMMONER_SPELLS = { 1:'净化', 3:'虚弱', 4:'闪现', 6:'疾跑', 7:'治疗', 11:'惩戒', 12:'传送', 14:'点燃', 21:'屏障', 13:'清晰术' };
function spellIcon(id) {
  const f = SUMMONER_SPELL_FILES[id];
  return f ? `${CD_OPGG}/spell/${f}.png` : '';
}

const RUNE_PAGES = { 8000:'精密', 8100:'主宰', 8200:'巫术', 8300:'灵感', 8400:'坚决' };
const ORDINAL_SUFFIX = ['th','st','nd','rd','th','th','th','th','th','th'];
function ordinal(n) {
  if (n == null) return '';
  const v = +n;
  if (v >= 10 && v <= 20) return v + 'th';
  return v + (ORDINAL_SUFFIX[v % 10] || 'th');
}

// ============================================================
// 工具函数
// ============================================================
function fmtKst(iso, withSeconds = false) {
  if (!iso) return '-';
  try {
    const dt = new Date(iso);
    const opts = { timeZone: 'Asia/Seoul', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
    if (withSeconds) opts.second = '2-digit';
    return dt.toLocaleString('zh-CN', opts);
  } catch { return iso.slice(0, 16); }
}

function ageString(iso) {
  if (!iso) return '-';
  const ageSec = (Date.now() - new Date(iso).getTime()) / 1000;
  if (ageSec < 60) return `${Math.floor(ageSec)}秒前`;
  if (ageSec < 3600) return `${Math.floor(ageSec/60)}分钟前`;
  if (ageSec < 86400) return `${Math.floor(ageSec/3600)}小时前`;
  return `${Math.floor(ageSec/86400)}天前`;
}

function fmtNum(n, suffix = '') {
  if (n == null || isNaN(n)) return '-';
  n = Number(n);
  if (n >= 10000) return (n/10000).toFixed(1) + 'w' + suffix;
  if (n >= 1000) return (n/1000).toFixed(1) + 'k' + suffix;
  return n + suffix;
}

function fmtDuration(sec) {
  if (!sec) return '-';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}分${s}秒`;
}

function tierName(tier) {
  if (!tier) return '未定级';
  return TIER_NAMES[tier] || tier;
}

function fmtRank(rank, total) {
  if (!rank) return '-';
  const fmt = (n) => n >= 10000 ? (n/10000).toFixed(1) + 'w' : n.toLocaleString();
  if (total) return `${fmt(rank)} / ${fmt(total)}`;
  return fmt(rank);
}

function calcKdaStr(k, d, a) {
  k = +k||0; d = +d||0; a = +a||0;
  if (d === 0) return k+a > 0 ? 'Perfect' : '0.00';
  return ((k+a)/d).toFixed(2);
}

function calcWr(w, p) {
  w = +w||0; p = +p||0;
  if (!p) return '0%';
  return (w/p*100).toFixed(1) + '%';
}

// ============================================================
// 数据获取
// ============================================================
async function fetchJson(url) {
  const u = `${url}?t=${Date.now()}`;
  const r = await fetch(u, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

let currentData = { state: null, events: [], profile: null, matches: [] };

async function refresh() {
  const fetchEl = document.getElementById('last-fetch');
  fetchEl.textContent = '刷新中...';
  try {
    const [state, events, profile, matches] = await Promise.all([
      fetchJson(FILES.state).catch(() => null),
      fetchJson(FILES.events).catch(() => null),
      fetchJson(FILES.profile).catch(() => null),
      fetchJson(FILES.matches).catch(() => null),
    ]);
    currentData = { state, events: events || [], profile, matches: matches || [] };
    renderAll();
    fetchEl.textContent = `最后刷新: ${new Date().toLocaleTimeString('zh-CN')}`;
  } catch (e) {
    fetchEl.textContent = `刷新失败: ${e.message}`;
  }
}

// ============================================================
// 渲染
// ============================================================
function deriveStatus(state, profile) {
  const updated = (profile && profile.updated_at) || (state && state.profile && state.profile.updated_at);
  if (!updated) return { level: 'unknown', text: '无数据' };
  const ageSec = (Date.now() - new Date(updated).getTime()) / 1000;
  if (ageSec < 300) return { level: 'online', text: `游戏中? (${Math.floor(ageSec)}s 前刷新)` };
  if (ageSec < 1800) return { level: 'unknown', text: `可能离线 (${ageString(updated)})` };
  return { level: 'offline', text: `离线 (${ageString(updated)})` };
}

function renderHero() {
  const { state, profile } = currentData;
  const p = profile || (state && state.profile) || {};

  if (p.profile_image_url) {
    const img = document.getElementById('avatar');
    img.src = p.profile_image_url;
    img.style.display = '';
  }
  document.getElementById('hero-name').textContent = p.name || p.game_name || 'TheShy';

  const status = deriveStatus(state, profile);
  const tag = document.getElementById('status-tag');
  tag.className = `tag ${status.level}`;
  document.getElementById('status-text').textContent = status.text;

  // 段位 + 胜率: 取第一个非 ARENA 的 league_stats
  const ls = (p.league_stats || []).filter(l => l.game_type !== 'ARENA');
  if (ls.length) {
    const l = ls[0];
    const tierStr = `${tierName(l.tier)} ${l.division ? (DIVISION_NAMES[l.division] || l.division) : ''} · ${l.lp ?? 0} LP`;
    const tierTag = document.getElementById('tier-tag');
    tierTag.style.display = '';
    tierTag.className = `tag tier-${l.tier}`;
    document.getElementById('tier-val').textContent = tierStr;

    const play = l.play || (l.match_win || 0) + (l.match_lose || 0);
    const wr = play ? ((l.match_win / play) * 100).toFixed(1) : 0;
    document.getElementById('wr-tag').style.display = '';
    document.getElementById('wr-val').textContent =
      `${l.match_win ?? l.win ?? 0}W ${l.match_lose ?? l.lose ?? 0}L · ${wr}%`;
  }

  const lr = p.ladder_rank;
  if (lr && (lr.rank || lr.total)) {
    document.getElementById('ladder-tag').style.display = '';
    document.getElementById('ladder-val').textContent = fmtRank(lr.rank, lr.total);
  }
}

function renderSeasons() {
  const { profile } = currentData;
  if (!profile) {
    document.getElementById('season-grid').innerHTML = '<div class="empty">无赛季数据</div>';
    return;
  }
  const prev = profile.previous_season_tiers || [];
  const seas = profile.previous_seasons || [];
  const allSeasons = {};
  for (const s of seas) allSeasons[s.season_id] = { tier: s.tier, division: s.division, lp: s.lp };
  for (const pst of prev) {
    if (!allSeasons[pst.season_id]) allSeasons[pst.season_id] = {};
    allSeasons[pst.season_id][pst.game_type] = {
      tier: pst.tier, division: pst.division, lp: pst.lp, win: pst.win, lose: pst.lose,
      high_tier: pst.high_tier, high_division: pst.high_division, high_lp: pst.high_lp,
      created_at: pst.created_at,
    };
  }
  const seasons = Object.keys(allSeasons).sort((a, b) => b - a);
  if (seasons.length === 0) {
    document.getElementById('season-grid').innerHTML = '<div class="empty">无历史赛季</div>';
    return;
  }
  document.getElementById('season-grid').innerHTML = seasons.map(sid => {
    const s = allSeasons[sid];
    let parts = [];
    if (s.tier) parts.push(`<div class="tier-name tier-${s.tier}">${tierName(s.tier)} ${s.division ? DIVISION_NAMES[s.division]||s.division : ''} <span class="card-meta">LP ${s.lp ?? 0}</span></div>`);
    for (const gt of ['SOLORANKED', 'FLEXRANKED']) {
      if (s[gt]) {
        const x = s[gt];
        const highStr = x.high_tier ? ` · 最高 ${tierName(x.high_tier)} ${x.high_division||''} (${x.high_lp} LP)` : '';
        parts.push(`<div class="kv"><span class="k">${GAME_TYPES[gt]}</span><span class="v tier-${x.tier}">${tierName(x.tier)} ${x.division?DIVISION_NAMES[x.division]||x.division:''} · ${x.win||0}W ${x.lose||0}L${highStr}</span></div>`);
      }
    }
    return `<div class="card"><div class="card-header"><div class="card-title">S${sid}</div></div>${parts.join('')}</div>`;
  }).join('');
}

function renderMatches() {
  const { matches } = currentData;
  if (!matches || matches.length === 0) {
    document.getElementById('matches-list').innerHTML = '<div class="empty">暂无最近比赛 (OP.GG 还没记录到)</div>';
    return;
  }
  document.getElementById('matches-meta').textContent = `${matches.length} 场 · 点击展开详情`;
  document.getElementById('matches-list').innerHTML = matches.map((m, idx) => {
    const win = m.result === 'WIN';
    const mins = m.game_length_second ? Math.floor(m.game_length_second/60) : '-';
    const me = getTheshyParticipant(m);
    const mvp = m.op_score_rank === 1;
    const svp = m.op_score_rank && !mvp && m.op_score_rank <= 3;
    const rankBadge = mvp ? '<span class="rank-badge mvp">MVP</span>' :
                      (m.op_score_rank === 2 ? '<span class="rank-badge svp">SVP</span>' :
                      m.op_score_rank ? `<span class="rank-badge">${ordinal(m.op_score_rank)}</span>` : '');

    // 队友/对手小头像 (TheShy 所在队队友 + 对手, 各5个)
    const teammates = (m.participants || []).filter(p => p.team_key === m.team_key && !(p.summoner_name === 'The shy' && p.summoner_tag === 'asdf'));
    const enemies = (m.participants || []).filter(p => p.team_key !== m.team_key);
    const allyHtml = teammates.map(p => `<img class="mini-champ" src="${champIcon(p.champion_id)}" title="${p.summoner_name}#${p.summoner_tag}" alt="" onerror="${IMG_ERR}">`).join('');
    const enemyHtml = enemies.map(p => `<img class="mini-champ" src="${champIcon(p.champion_id)}" title="${p.summoner_name}#${p.summoner_tag}" alt="" onerror="${IMG_ERR}">`).join('');

    const myItems = (m.items || []).slice(0, 7);
    while (myItems.length < 7) myItems.push(0);
    const myItemNames = (m.items_names || []).slice(0, 7);
    while (myItemNames.length < 7) myItemNames.push('');
    const itemsHtml = myItems.map((iid, i) => {
      if (!iid) return '<span class="item-icon item-empty"></span>';
      return `<img class="item-icon" src="${itemIcon(iid)}" title="${myItemNames[i]||''}" alt="" onerror="${IMG_ERR}">`;
    }).join('');

    const spellsHtml = (m.spells || []).map(s => `<img class="spell-icon" src="${spellIcon(s)}" title="${SUMMONER_SPELLS[s]||''}" alt="" onerror="${IMG_ERR}">`).join('');
    const rune = m.rune || {};
    const runeHtml = runeIconHtml(rune, 'spell-icon');

    return `
      <div class="g-match g-match-row ${win?'g-win-bg':'g-lose-bg'}" data-idx="${idx}" style="cursor:pointer;">
        <div class="g-champ-col">
          <div class="g-champ-wrap">
            <img class="g-champ-icon" src="${champIcon(m.champion_id)}" alt="${m.champion||''}" onerror="${IMG_ERR}">

            <span class="g-kda-sep">/</span>
            <span class="g-kda-num">${m.assist||0}</span>

          <div class="g-sub-line">
            CS ${(m.minion_kill||0)+(m.neutral_minion_kill||0)} · ${fmtNum(m.gold_earned)}金 · 伤害 ${fmtNum(m.total_damage_dealt_to_champions)}

      </div>
      <div class="g-match-detail" data-detail="${idx}" style="display:none;">
        ${renderMatchDetail(m)}
      </div>

  }).join('');

  document.querySelectorAll('#matches-list .g-match-row').forEach(row => {
    row.onclick = () => {
      const idx = row.dataset.idx;
      const detail = document.querySelector(`#matches-list .g-match-detail[data-detail="${idx}"]`);
      const arrow = row.querySelector('.g-arrow');
      if (detail) {
        const isOpen = detail.style.display !== 'none';
        detail.style.display = isOpen ? 'none' : '';
        if (arrow) arrow.textContent = isOpen ? '▼' : '▲';
      }
    };
  });
}

function getTheshyParticipant(m) {
  const parts = m.participants || [];
  const me = parts.find(p => p.summoner_name === 'The shy' && p.summoner_tag === 'asdf');
  return me || { champion_id: m.champion_id, champion_name: m.champion, team_key: m.team_key, kill: m.kill, death: m.death, assist: m.assist };
}

function renderMatchDetail(m) {
  const parts = m.participants || [];
  if (!parts.length) {
    return renderMatchDetailLegacy(m);
  }

  const blueTeam = parts.filter(p => p.team_key === 'BLUE');
  const redTeam = parts.filter(p => p.team_key === 'RED');
  const teamBlueStat = (m.teams||[]).find(t => t.key === 'BLUE') || {};
  const teamRedStat = (m.teams||[]).find(t => t.key === 'RED') || {};
  const bs = teamBlueStat.game_stat || {};
  const rs = teamRedStat.game_stat || {};
  const blueResult = blueTeam[0]?.result;
  const blueIsWin = blueResult === 'WIN' || bs.is_win === true || bs.is_win === 'true';
  const redResult = redTeam[0]?.result;
  const redIsWin = redResult === 'WIN' || rs.is_win === true || rs.is_win === 'true';

  const maxDmg = Math.max(...parts.map(p => p.total_damage_dealt_to_champions || 0), 1);
  const maxTaken = Math.max(...parts.map(p => p.total_damage_taken || 0), 1);

  function teamHeaderHtml(isWin, gameStat, label) {
    const kills = gameStat.champion_kill ?? 0;
    const towers = gameStat.tower_kill ?? 0;
    const dragons = gameStat.dragon_kill ?? 0;
    const barons = gameStat.baron_kill ?? 0;
    const inhibs = gameStat.inhibitor_kill ?? 0;
    const heralds = gameStat.rift_herald_kill ?? 0;
    const atakhans = gameStat.atakhan_kill ?? 0;
    const hordes = gameStat.horde_kill ?? 0;
    const firstBlood = gameStat.champion_first === true || gameStat.champion_first === 'true';
    const totalGold = gameStat.gold_earned ?? 0;
    return `
      <div class="g-team-header ${isWin?'g-th-win':'g-th-lose'}">
        <span class="g-th-side">${label}</span>
        <span class="g-th-kills">${kills}</span>
        <span class="g-th-objs">
          ${firstBlood ? '<span class="obj-icon obj-fb" title="一血">一血</span>' : ''}
          ${towers ? `<span class="obj-icon" title="防御塔">塔 ${towers}</span>` : ''}
          ${dragons ? `<span class="obj-icon" title="小龙">龙 ${dragons}</span>` : ''}
          ${heralds ? `<span class="obj-icon" title="峡谷先锋">锋 ${heralds}</span>` : ''}
          ${barons ? `<span class="obj-icon" title="纳什男爵">巴 ${barons}</span>` : ''}
          ${atakhans ? `<span class="obj-icon" title="阿塔坎">阿 ${atakhans}</span>` : ''}
          ${hordes ? `<span class="obj-icon" title="虚空巢虫">虫 ${hordes}</span>` : ''}
          ${inhibs ? `<span class="obj-icon" title="水晶">晶 ${inhibs}</span>` : ''}
          ${totalGold ? `<span class="obj-icon obj-gold">金 ${fmtNum(totalGold)}</span>` : ''}
        </span>
        <span class="g-th-result">${isWin?'胜利':'失败'}</span>
      </div>
    `;
  }

  function multiKillBadge(n) {
    if (!n || n < 2) return '';
    const labels = {2:'双杀',3:'三杀',4:'四杀',5:'五杀'};
    return `<span class="mk-badge mk-${n}">${labels[n]||n+'杀'}</span>`;
  }

  function participantRow(p, isMe) {
    const dmg = p.total_damage_dealt_to_champions || 0;
    const taken = p.total_damage_taken || 0;
    const dmgPct = maxDmg ? (dmg / maxDmg * 100) : 0;
    const takenPct = maxTaken ? (taken / maxTaken * 100) : 0;
    const cs = (p.minion_kill||0) + (p.neutral_minion_kill||0);
    const kdaRatio = p.kda || calcKdaStr(p.kill, p.death, p.assist);
    const isMvp = p.op_score_rank === 1;
    const isSvp = p.op_score_rank === 2;
    const opScore = p.op_score;
    const rankBadge = isMvp ? '<span class="rank-badge mvp">MVP</span>' :
                      isSvp ? '<span class="rank-badge svp">SVP</span>' :
                      p.op_score_rank && p.op_score_rank <= 5 ? `<span class="rank-badge">${ordinal(p.op_score_rank)}</span>` : '';
    const itemsArr = p.items || [];
    const itemsNamesArr = p.items_names || [];
    while (itemsArr.length < 7) { itemsArr.push(0); itemsNamesArr.push(''); }
    const itemsHtml = itemsArr.slice(0,7).map((iid,i) => {
      const n = itemsNamesArr[i] || '';
      if (!iid) return `<span class="item-icon-sm item-empty" title=""></span>`;
      return `<img class="item-icon-sm" src="${itemIcon(iid)}" title="${n}" alt="" onerror="${IMG_ERR}">`;
    }).join('');
    const spellsHtml = (p.spells||[]).map(s => `<img class="spell-icon-sm" src="${spellIcon(s)}" alt="" onerror="${IMG_ERR}">`).join('');
    const pr = p.rune || {};
    const runeHtml = runeIconHtml(pr, 'spell-icon-sm');
    const name = p.summoner_name || '?';
    const tag = p.summoner_tag ? `#${p.summoner_tag}` : '';
    const rowWin = p.result === 'WIN';
    const mk = multiKillBadge(p.largest_multi_kill);
    const opScoreStr = opScore ? `<span class="op-score" title="OP评分">${Number(opScore).toFixed(1)}</span>` : '';
    return `
      <div class="g-p-row ${isMe?'g-me':''} ${rowWin?'g-p-win':'g-p-lose'}">
        <div class="g-p-champ">
          <img class="g-p-icon" src="${champIcon(p.champion_id)}" alt="${p.champion_name||''}" onerror="${IMG_ERR}">
          <span class="g-p-lv">${p.champion_level||''}</span>
        </div>
        <div class="g-p-spells">${spellsHtml}${runeHtml}</div>
        <div class="g-p-name">
          <div class="g-p-id ${isMe?'g-me-name':''}">${rankBadge} ${name}${tag} ${mk} ${opScoreStr}</div>
          <div class="g-p-pos">${POSITIONS[p.position]||p.position||''}</div>
        </div>
        <div class="g-p-kda">
          <span class="g-kda-sm-wrap"><span class="g-kda-sm ${rowWin?'g-kda-sm-win':'g-kda-sm-lose'}">${p.kill||0}</span><span class="g-kda-sm-sep">/</span><span class="g-kda-sm g-kda-sm-death">${p.death||0}</span><span class="g-kda-sm-sep">/</span><span class="g-kda-sm ${rowWin?'g-kda-sm-win':'g-kda-sm-lose'}">${p.assist||0}</span></span>
          <span class="g-kda-ratio-sm">${kdaRatio}</span>
        </div>
        <div class="g-p-items">${itemsHtml}</div>
        <div class="g-p-dmg">
          <div class="g-dmg-bar-wrap">
            <div class="g-dmg-bar g-dmg-bar-out ${rowWin?'g-dmg-win':'g-dmg-lose'}" style="width:${dmgPct}%"></div>
          </div>
          <div class="g-dmg-bar-wrap g-taken-wrap">
            <div class="g-dmg-bar g-dmg-bar-taken" style="width:${takenPct}%"></div>
          </div>
          <div class="g-dmg-num">输出 ${fmtNum(dmg)} · 承伤 ${fmtNum(taken)} · CS ${cs} · ${fmtNum(p.gold_earned)}金</div>
        </div>
      </div>
    `;
  }

  function banSection(bans, banIds) {
    if (!bans || !bans.length) return '';
    return `<div class="g-bans">
      <span class="g-bans-label">禁用:</span>
      ${bans.map((n,i) => `<div class="ban-wrap"><img class="ban-icon" src="${champIcon(banIds[i])}" title="${n}" alt="${n}" onerror="${IMG_ERR}"><span class="ban-x">✕</span></div>`).join('')}
    </div>`;
  }

  const ati = m.average_tier_info;
  const avgTierStr = ati ? `${tierName(ati.tier)} ${ati.division?DIVISION_NAMES[ati.division]||ati.division:''}` : '';
  const gameTime = m.game_length_second ? `${Math.floor(m.game_length_second/60)}分${m.game_length_second%60}秒` : '';

  return `
    <div class="g-detail-wrap">
      ${avgTierStr ? `<div class="g-avg-tier">平均段位: ${avgTierStr} · 时长: ${gameTime}</div>` : ''}
      ${teamHeaderHtml(blueIsWin, bs, '蓝方')}
      ${blueTeam.map(p => participantRow(p, p.summoner_name==='The shy'&&p.summoner_tag==='asdf')).join('')}
      ${banSection(teamBlueStat.banned_champions_names, teamBlueStat.banned_champions)}
      ${teamHeaderHtml(redIsWin, rs, '红方')}
      ${redTeam.map(p => participantRow(p, p.summoner_name==='The shy'&&p.summoner_tag==='asdf')).join('')}
      ${banSection(teamRedStat.banned_champions_names, teamRedStat.banned_champions)}
    </div>
  `;
}

let mcTabIndex = 0;
function renderMostChampions() {
  const { profile } = currentData;
  if (!profile) return;

  const tabs = [];
  if (profile.most_champions && profile.most_champions.champion_stats && profile.most_champions.champion_stats.length) {
    tabs.push({ key: 'mc', label: `赛季总览 (${profile.most_champions.play||0}场)`, data: profile.most_champions, type: 'season' });
  }
  if (profile.ranked_most_champions && profile.ranked_most_champions.my_champion_stats && profile.ranked_most_champions.my_champion_stats.length) {
    tabs.push({ key: 'rmc', label: `排位专属 (${profile.ranked_most_champions.play||0}场)`, data: profile.ranked_most_champions, type: 'ranked' });
  }
  if (profile.recent_champion_stats && profile.recent_champion_stats.length) {
    tabs.push({ key: 'rcs', label: `近期 (${profile.recent_champion_stats.length}英雄)`, data: profile.recent_champion_stats, type: 'recent' });
  }

  if (tabs.length === 0) {
    document.getElementById('mc-tabs').innerHTML = '';
    document.getElementById('mc-content').innerHTML = '<div class="empty">无英雄数据</div>';
    return;
  }
  if (mcTabIndex >= tabs.length) mcTabIndex = 0;

  document.getElementById('mc-tabs').innerHTML = tabs.map((t, i) =>
    `<div class="tab ${i === mcTabIndex ? 'active' : ''}" data-idx="${i}">${t.label}</div>`
  ).join('');
  document.querySelectorAll('#mc-tabs .tab').forEach(el => {
    el.onclick = () => { mcTabIndex = +el.dataset.idx; renderMostChampions(); };
  });

  const t = tabs[mcTabIndex];
  document.getElementById('mc-meta').textContent = `S${t.data.season_id || '-'} · ${t.data.game_type ? (GAME_TYPES[t.data.game_type]||t.data.game_type) : ''}`;

  let html = '';
  if (t.type === 'season') {
    html = renderSeasonChampTable(t.data);
  } else if (t.type === 'ranked') {
    html = renderRankedChampTable(t.data);
  } else if (t.type === 'recent') {
    html = renderRecentChampTable(t.data);
  }
  document.getElementById('mc-content').innerHTML = html;

  // 绑定点击展开/收起事件
  document.querySelectorAll('#mc-content .champ-row').forEach(row => {
    row.onclick = () => {
      const idx = row.dataset.idx;
      const detail = document.querySelector(`#mc-content .champ-detail[data-detail="${idx}"]`);
      if (detail) detail.style.display = detail.style.display === 'none' ? '' : 'none';
    };
  });
}

              <td colspan="12">
                <div class="detail-grid">
                  ${detail.map(([k, v]) => `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}
                </div>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    <div class="champ-meta" style="margin-top:8px;">💡 点击任意行展开查看完整数据 (35+ 字段)</div>
  `;
}

function renderRecentChampTable(rcs) {
  if (!rcs || rcs.length === 0) return '<div class="empty">无近期英雄数据</div>';
  return `
    <table class="champ-table">
      <thead>
        <tr>
          <th>英雄</th>
          <th>场次</th>
          <th>胜场</th>
          <th>K</th><th>D</th><th>A</th>
        </tr>
      </thead>
      <tbody>
        ${rcs.map(c => `
          <tr>
            <td class="champ-name">${c.champion_name || '?'}</td>
            <td class="num-mono">${c.play||0}</td>
            <td class="num-mono">${c.win||0}</td>
            <td class="num-mono">${c.kill||0}</td>
            <td class="num-mono">${c.death||0}</td>
            <td class="num-mono">${c.assist||0}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderEvents() {
  const { events } = currentData;
  if (!events || events.length === 0) {
    document.getElementById('events-list').innerHTML = '<div class="empty">暂无事件 (TheShy 上线/打完排位会出现在这里)</div>';
    return;
  }
  document.getElementById('events-meta').textContent = `${events.length} 条`;
  document.getElementById('events-list').innerHTML = events.slice(0, 100).map(ev => {
    let cls = 'event-item';
    let icon = '📨';
    let title = ev.type;
    let meta = fmtKst(ev.timestamp, true);
    if (ev.type === 'became_active' || ev.type === 'opgg_updated') {
      cls += ' active';
      icon = '🔥';
      title = 'TheShy 可能开始排位了';
      meta = `OP.GG 更新: ${fmtKst(ev.updated_at)} · ${ageString(ev.updated_at)}`;
    } else if (ev.type === 'new_match') {
      cls += ev.result === 'WIN' ? ' match-win' : ' match-lose';
      icon = ev.result === 'WIN' ? '🏆' : '💔';
      title = `${GAME_TYPES[ev.game_type]||ev.game_type} · ${ev.champion} · ${ev.result}`;
      meta = `KDA ${ev.kda} (${ev.kill}/${ev.death}/${ev.assist}) · ${fmtKst(ev.created_at)}`;
    } else if (ev.type === 'level_changed') {
      cls += ' level';
      icon = '📈';
      title = `等级 ${ev.old ?? '-'} → ${ev.new}`;
    } else if (ev.type === 'rank_changed') {
      cls += ' rank';
      icon = '🏆';
      title = `段位变化: ${ev.old} → ${ev.new}`;
      meta = `${GAME_TYPES[ev.game_type]||ev.game_type} · ${fmtKst(ev.timestamp)}`;
    } else if (ev.type === 'lp_changed') {
      const sign = ev.delta >= 0 ? '+' : '';
      cls += ev.delta >= 0 ? ' lp-up' : ' lp-down';
      icon = ev.delta >= 0 ? '📈' : '📉';
      title = `LP ${ev.old_lp} → ${ev.new_lp} (${sign}${ev.delta})`;
      meta = `${GAME_TYPES[ev.game_type]||ev.game_type} · ${tierName(ev.tier)} ${ev.division ? (DIVISION_NAMES[ev.division]||ev.division) : ''} · ${fmtKst(ev.timestamp)}`;
    } else if (ev.type === 'error') {
      icon = '⚠️';
      title = '监控错误';
      meta = ev.msg || '';
    } else if (ev.type === 'system_initialized') {
      icon = '🚀';
      title = ev.msg || '监控启动';
    }
    return `
      <div class="${cls}">
        <div class="icon">${icon}</div>
        <div class="body">
          <div class="title">${title}</div>
          <div class="meta">${meta}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderDebug() {
  const { state, profile, matches } = currentData;
  const dbg = document.getElementById('debug');
  if (!state && !profile) {
    dbg.textContent = '未加载到任何数据, 检查 raw URL 是否可访问';
    return;
  }
  const summary = {
    state_keys: state ? Object.keys(state) : [],
    state_last_check: state && state.last_check,
    state_is_active: state && state.is_active,
    profile_keys: profile ? Object.keys(profile) : [],
    profile_updated_at: profile && profile.updated_at,
    matches_count: matches ? matches.length : 0,
  };
  dbg.textContent = JSON.stringify(summary, null, 2);
}

function renderAll() {
  renderHero();
  renderMatches();
  renderEvents();
  renderSeasons();
  renderMostChampions();
  renderDebug();
}

// ============================================================
// commit count
// ============================================================
async function fetchCommitCount() {
  try {
    const r = await fetch(`${API_BASE}commits?per_page=1`, { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!r.ok) return;
    const link = r.headers.get('Link') || '';
    const m = link.match(/page=(\d+)>; rel="last"/);
    const count = m ? parseInt(m[1]) : 1;
    document.getElementById('check-count').textContent = count;
  } catch {}
}

// ============================================================
// 自动刷新
// ============================================================
let timer = null;
function setupAuto() {
  const sel = document.getElementById('refresh-interval');
  sel.addEventListener('change', () => {
    const sec = parseInt(sel.value);
    if (timer) { clearInterval(timer); timer = null; }
    if (sec > 0) timer = setInterval(refresh, sec * 1000);
  });
}

document.getElementById('refresh-btn').addEventListener('click', refresh);

setupAuto();
refresh();
fetchCommitCount();
setInterval(fetchCommitCount, 60000);
</script>
