<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheShy 排位监控</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #db6d28;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 920px; margin: 0 auto; }

  /* 顶部 Hero */
  .hero {
    background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(88,166,255,0.15), transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #58a6ff, #d29922);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero .subtitle {
    color: var(--muted);
    font-size: 14px;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 16px;
    border: 1px solid var(--border);
  }
  .status-pill.online { background: rgba(63,185,80,0.15); color: var(--green); border-color: rgba(63,185,80,0.4); }
  .status-pill.offline { background: rgba(139,148,158,0.15); color: var(--muted); }
  .status-pill.unknown { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .status-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 网格布局 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .card .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .card .value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .card .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* 事件历史 */
  .section-title {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .events {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .event-item:last-child { border-bottom: none; }
  .event-item .icon {
    font-size: 18px;
    line-height: 1;
    padding-top: 2px;
  }
  .event-item .body {
    flex: 1;
  }
  .event-item .title { font-weight: 600; margin-bottom: 2px; }
  .event-item .meta { font-size: 12px; color: var(--muted); }
  .event-item.match-win .title { color: var(--green); }
  .event-item.match-lose .title { color: var(--red); }
  .event-item.active .title { color: var(--orange); }
  .event-item.level .title { color: var(--accent); }

  /* 刷新控制 */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 16px 0;
    font-size: 13px;
    color: var(--muted);
  }
  .toolbar button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .toolbar button:hover {
    background: var(--border);
    border-color: var(--accent);
  }
  .toolbar select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }

  /* loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }
  .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Hero -->
  <div class="hero">
    <h1>TheShy 排位监控</h1>
    <div class="subtitle">基于 OP.GG MCP API · GitHub Actions 部署 · 数据每 10 分钟刷新</div>
    <div id="status-pill" class="status-pill unknown">
      <span class="dot"></span>
      <span id="status-text">加载中...</span>
    </div>
  </div>

  <!-- 状态卡片 -->
  <div class="grid">
    <div class="card">
      <div class="label">召唤师</div>
      <div class="value" id="summoner-name">TheShy#KR1</div>
      <div class="sub" id="summoner-internal">韩服 KR</div>
    </div>
    <div class="card">
      <div class="label">等级</div>
      <div class="value" id="summoner-level">-</div>
      <div class="sub" id="summoner-puuid"></div>
    </div>
    <div class="card">
      <div class="label">OP.GG 最后刷新</div>
      <div class="value" id="updated-at">-</div>
      <div class="sub" id="updated-age">-</div>
    </div>
    <div class="card">
      <div class="label">本仓库检测</div>
      <div class="value" id="last-check">-</div>
      <div class="sub" id="check-count">已运行 - 次</div>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <div>
      <span id="last-fetch">未刷新</span> ·
      <label>自动刷新:
        <select id="refresh-interval">
          <option value="0">关闭</option>
          <option value="30">30 秒</option>
          <option value="60" selected>1 分钟</option>
          <option value="300">5 分钟</option>
        </select>
      </label>
    </div>
    <button id="refresh-btn">立即刷新</button>
  </div>

  <!-- 事件历史 -->
  <div class="section-title">事件历史</div>
  <div class="events" id="events-list">
    <div class="empty">暂无事件数据</div>
  </div>

  <footer>
    数据源:
    <a href="https://mcp-api.op.gg/mcp" target="_blank">OP.GG MCP</a>
    ·
    <a href="https://www.op.gg/summoners/kr/TheShy" target="_blank">OP.GG TheShy</a>
    ·
    <a href="https://github.com/racheko-lab/theshy-monitor" target="_blank">GitHub 源码</a>
  </footer>
</div>

<script>
// ============================================================
// 配置 - 通过 URL 参数可改: ?repo=owner/name&branch=main&state=.theshy_opgg_state.json
// ============================================================
const params = new URLSearchParams(location.search);
const REPO = params.get('repo') || 'racheko-lab/theshy-monitor';
const BRANCH = params.get('branch') || 'main';
const STATE_FILE = params.get('state') || '.theshy_opgg_state.json';
const EVENTS_FILE = params.get('events') || '.theshy_events.json';
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/`;
const API_BASE = `https://api.github.com/repos/${REPO}/`;

// ============================================================
// 时间格式化
// ============================================================
function fmtKst(iso) {
  if (!iso) return '-';
  try {
    const dt = new Date(iso);
    // 转为 KST (UTC+9)
    const kst = new Date(dt.getTime() + (9 * 60 - dt.getTimezoneOffset() * -1) * 60000);
    return dt.toLocaleString('zh-CN', { timeZone: 'Asia/Seoul', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    return iso;
  }
}

function ageString(iso) {
  if (!iso) return '-';
  const dt = new Date(iso);
  const ageSec = (Date.now() - dt.getTime()) / 1000;
  if (ageSec < 60) return `${Math.floor(ageSec)} 秒前`;
  if (ageSec < 3600) return `${Math.floor(ageSec / 60)} 分钟前`;
  if (ageSec < 86400) return `${Math.floor(ageSec / 3600)} 小时前`;
  return `${Math.floor(ageSec / 86400)} 天前`;
}

// ============================================================
// 状态判断
// ============================================================
function deriveStatus(state) {
  if (!state || !state.profile || !state.profile.updated_at) {
    return { level: 'unknown', text: '暂无数据' };
  }
  const updatedAt = new Date(state.profile.updated_at);
  const ageSec = (Date.now() - updatedAt.getTime()) / 1000;
  if (ageSec < 300) {
    return { level: 'online', text: '可能正在游戏中 (OP.GG 高频刷新)' };
  }
  if (ageSec < 1800) {
    return { level: 'unknown', text: '可能刚下线 / 等待 OP.GG 刷新' };
  }
  return { level: 'offline', text: `离线 (${ageString(state.profile.updated_at)})` };
}

// ============================================================
// 渲染
// ============================================================
function renderState(state, events) {
  // 状态 pill
  const status = deriveStatus(state);
  const pill = document.getElementById('status-pill');
  pill.className = `status-pill ${status.level}`;
  document.getElementById('status-text').textContent = status.text;

  // 召唤师卡片
  if (state && state.profile) {
    document.getElementById('summoner-name').textContent =
      `${state.profile.name || 'TheShy'}#KR1`;
    document.getElementById('summoner-internal').textContent = '韩服 KR';
    document.getElementById('summoner-level').textContent = state.profile.level || '-';
    if (state.profile.puuid) {
      const p = state.profile.puuid;
      document.getElementById('summoner-puuid').textContent =
        `PUUID: ${p.substring(0, 8)}...${p.substring(p.length - 6)}`;
    }
    document.getElementById('updated-at').textContent = fmtKst(state.profile.updated_at);
    document.getElementById('updated-age').textContent = ageString(state.profile.updated_at);
  }
  if (state && state.last_check) {
    document.getElementById('last-check').textContent = fmtKst(state.last_check);
  }

  // 事件列表
  const listEl = document.getElementById('events-list');
  if (!events || events.length === 0) {
    listEl.innerHTML = '<div class="empty">暂无事件 (TheShy 上线/下线/打完排位会出现在这里)</div>';
    return;
  }
  listEl.innerHTML = events.slice(0, 50).map(ev => {
    let cls = 'event-item';
    let icon = '📨';
    let title = ev.type;
    let meta = ev.timestamp || '';
    if (ev.type === 'became_active' || ev.type === 'opgg_updated') {
      cls += ' active';
      icon = '🔥';
      title = 'TheShy 可能开始排位了';
      meta = `OP.GG 更新: ${fmtKst(ev.updated_at)}`;
    } else if (ev.type === 'new_match') {
      cls += ev.result === 'WIN' ? ' match-win' : ' match-lose';
      icon = ev.result === 'WIN' ? '🏆' : '💔';
      const typeMap = { SOLORANKED: '单双排', FLEXRANKED: '灵活', NORMAL: '匹配', ARAM: '大乱斗' };
      title = `${typeMap[ev.game_type] || ev.game_type} · ${ev.champion} · ${ev.result}`;
      meta = `KDA ${ev.kda} · ${fmtKst(ev.created_at || ev.timestamp)}`;
    } else if (ev.type === 'level_changed') {
      cls += ' level';
      icon = '📈';
      title = `等级 ${ev.old} → ${ev.new}`;
    } else if (ev.type === 'error') {
      cls += '';
      icon = '⚠️';
      title = '监控错误';
      meta = ev.msg || '';
    }
    return `
      <div class="${cls}">
        <div class="icon">${icon}</div>
        <div class="body">
          <div class="title">${title}</div>
          <div class="meta">${meta}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// 拉取数据
// ============================================================
async function fetchJson(url, useCacheBust = true) {
  const u = useCacheBust ? `${url}?t=${Date.now()}` : url;
  const r = await fetch(u, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

async function refresh() {
  const fetchEl = document.getElementById('last-fetch');
  fetchEl.textContent = '刷新中...';
  try {
    const [state, events] = await Promise.all([
      fetchJson(RAW_BASE + STATE_FILE).catch(() => null),
      fetchJson(RAW_BASE + EVENTS_FILE).catch(() => null),
    ]);
    renderState(state || {}, events || []);
    fetchEl.textContent = `最后刷新: ${new Date().toLocaleTimeString('zh-CN')}`;
  } catch (e) {
    fetchEl.textContent = `刷新失败: ${e.message}`;
    console.error(e);
  }
}

// ============================================================
// commit count (检测次数)
// ============================================================
async function fetchCommitCount() {
  try {
    const r = await fetch(`${API_BASE}commits?per_page=1`, { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!r.ok) return;
    const link = r.headers.get('Link') || '';
    const m = link.match(/page=(\d+)>; rel="last"/);
    const count = m ? parseInt(m[1]) : 1;
    document.getElementById('check-count').textContent = `已运行 ${count} 次`;
  } catch (e) {}
}

// ============================================================
// 自动刷新
// ============================================================
let refreshTimer = null;
function setupAutoRefresh() {
  const sel = document.getElementById('refresh-interval');
  sel.addEventListener('change', () => {
    const sec = parseInt(sel.value);
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    if (sec > 0) {
      refreshTimer = setInterval(refresh, sec * 1000);
    }
  });
}

document.getElementById('refresh-btn').addEventListener('click', refresh);

// 初始化
setupAutoRefresh();
refresh();
fetchCommitCount();
setInterval(fetchCommitCount, 60000);  // 每 60s 更新运行次数
</script>
</body>
</html>
